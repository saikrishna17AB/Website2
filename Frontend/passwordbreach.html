<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Breach Checker</title>
</head>
<body>

    <h2>🔐 Password Breach Checker</h2>

    <p>
        Check if your password has appeared in known data breaches.
        Your password is never sent — only a secure hash is used.
    </p>

    <hr>

    <label>Enter Password:</label><br><br>
    <input type="password" id="passwordInput" placeholder="Enter password"><br><br>

    <button id="checkBtn">Check Password</button>

    <p id="resultMsg"></p>

    <br><hr>

    <button id="backBtn">⬅ Back</button>

    <script src="passwordbreach.js"></script>

</body>
</html>
