<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Submit Report | Cyber Sentinel</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="centered-content">
    <div class="modern-card fade-in">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div style="width: 70px; height: 70px; background: #e0f2fe; border-radius: 20px; display: flex; justify-content: center; align-items: center; margin: 0 auto 1.5rem; color: #0369a1;">
                <i data-lucide="file-warning" style="width: 35px; height: 35px;"></i>
            </div>
            <h2>Incident Report</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Please provide details of the suspicious activity.</p>
        </div>

        <form id="reportform">
            <div class="form-group">
                <label for="type">Incident Type</label>
                <div style="position: relative; display: flex; align-items: center; border-bottom: 2px solid #e2e8f0;">
                    <i data-lucide="tag" style="color: #94a3b8; margin-right: 12px; width: 18px;"></i>
                    <select id="type" name="type">
                        <option value="url">URL</option>
                        <option value="email">Email</option>
                        <option value="phone">Phone</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="content">Link / Email / Phone</label>
                <div style="position: relative; display: flex; align-items: center; border-bottom: 2px solid #e2e8f0;">
                    <i data-lucide="target" style="color: #94a3b8; margin-right: 12px; width: 18px;"></i>
                    <input type="text" id="content" placeholder="Enter malicious URL">
                </div>
            </div>

            <div class="form-group">
                <label for="description">Detailed Description</label>
                <div style="position: relative; display: flex; align-items: flex-start; padding-top: 10px; border: 1px solid #e2e8f0; border-radius: 10px;">
                    <i data-lucide="info" style="color: #94a3b8; margin: 12px 12px 0; width: 18px;"></i>
                    <textarea id="description" placeholder="Provide extra information about the threat..." style="border: none; padding: 10px 0; height: 100px; width: 100%;"></textarea>
                </div>
            </div>

            <p id="msg" class="feedback" style="margin-bottom: 1.5rem; min-height: 1.5rem;"></p>

            <button type="submit" class="btn-primary">Submit Report</button>
            
            <div style="text-align: center; margin-top: 2rem;">
                <a href="#" id="Goback" style="text-decoration: none; color: var(--text-muted); font-size: 0.9rem; font-weight: 500;">
                    <i data-lucide="arrow-left" style="width: 14px; vertical-align: middle; margin-right: 5px;"></i> Back to Dashboard
                </a>
            </div>
        </form>
    </div>

    <script src="report.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
