<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="passwordstrength.css">
</head>

<body>

<header>
    <a href="userdashboard.html" class="nav-brand">CYBER SENTINEL</a>
    <nav>
        <ul>
            <li><a href="userdashboard.html">Dashboard</a></li>
            <li><a href="suspiciousurl.html">URL Tools</a></li>
            <li><a href="passwordbreach.html">Security Check</a></li>
            <li><a href="passwordstrength.html" style="color: var(--primary-purple);">Password Strength</a></li>
            <li><a href="report.html">Report Incident</a></li>
            <li><button id="logout" class="btn-secondary">Logout</button></li>
        </ul>
    </nav>
</header>

<div class="container fade-in">
    <div class="scanner-container">

        <div class="scanner-header">
            <div class="icon-box">
                <i data-lucide="shield-check"></i>
            </div>
            <h1>Password Strength Analyzer</h1>
            <p>Evaluate your password and get secure suggestions instantly.</p>
        </div>
        <div class="input-section">

            <div class="form-group">
                <label for="passwordInput">Enter Password</label>
                <div class="input-wrapper">
                    <i data-lucide="lock"></i>
                    <input type="password" id="passwordInput" placeholder="••••••••">
                </div>
            </div>

            <button id="checkBtn" class="btn-primary">Analyze Password</button>

            <div id="strengthResult" class="result-box"></div>

            <div id="suggestionsBox" class="suggestions-box"></div>

            <div style="margin-top: 3rem;">
                <button id="backBtn" class="btn-secondary" style="width: 100%;">
                    <i data-lucide="arrow-left"></i> Back to Dashboard
                </button>
            </div>

        </div>
    </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/zxcvbn/4.4.2/zxcvbn.js"></script>
<script src="passwordstrength.js"></script>
<script>
    lucide.createIcons();
</script>

</body>
</html>
