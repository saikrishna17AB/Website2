<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin | Cyber Sentinel</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="superadmin.css">
</head> 
<body>
    <header>
        <a href="userdashboard.html" class="nav-brand">CYBER SENTINEL <span style="font-size: 0.65rem; vertical-align: middle; color: var(--danger-red); text-transform: uppercase;">[Super Admin]</span></a>
        <nav>
            <ul>
                <li><a href="userdashboard.html">Dashboard</a></li>
                <li><a href="superadmin.html" style="color: var(--primary-purple);">User Registry</a></li>
                <li><button id="logout" class="btn-secondary">Logout</button></li>
            </ul>
        </nav>
    </header>

    
    <!-- MAIN MENU -->
        <div id="mainMenu">
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2rem; margin-bottom: 2rem;">
            
                <div class="modern-card" style="text-align: center; cursor: pointer; padding: 2rem;" id="viewAdminRequestsBtn">
                    <div style="width: 60px; height: 60px; background: #fef3c7; border-radius: 15px; display: flex; justify-content: center; align-items: center; margin: 0 auto 1rem; color: #b45309;">
                        <i data-lucide="shield-alert"></i>
                    </div>
                    <h3>Admin Requests</h3>
                    <p>Review users requesting admin access</p>
                </div>

            </div>
        </div>

        <!-- ADMIN REQUESTS SECTION -->
        <div id="requestsSection" style="display:none;">
            <div style="margin-bottom: 2rem; display:flex; justify-content: space-between;">
                <h2>Admin Requests</h2>
                <button id="backFromRequests" class="btn-secondary">Back</button>
            </div>

            <div class="registry-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="users-table"></tbody>
                </table>
            </div>
        </div>

    

    <script src="superadmin.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
